server {
    listen 80;
    listen [::]:80;
    server_name tools.plkcontabil.com.br; # Quando criar o DNS do outro, adicione: tools.prolinkcontabil.com.br;

    # Redireciona o tráfego HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tools.plkcontabil.com.br; # Quando criar o DNS do outro, adicione: tools.prolinkcontabil.com.br;

    # O container do Nginx especial detecta essas linhas e busca os certificados na AWS
    ssl_certificate /etc/letsencrypt/live/tools.plkcontabil.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tools.plkcontabil.com.br/privkey.pem;

    location / {
        proxy_pass http://ferramentas:8501;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Necessário para o Streamlit (WebSocket)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }
}
