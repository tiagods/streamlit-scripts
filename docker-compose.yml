services:
  ferramentas:
    build: .
    expose:
      - "8501"
    restart: unless-stopped

  nginx:
    image: jonasal/nginx-certbot:latest
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Esse container lê config desta pasta especial e pega o certificado automático
      - ./nginx/nginx.conf:/etc/nginx/user_conf.d/default.conf:ro
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      - ferramentas
    restart: unless-stopped
